name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install all workspace dependencies
        run: npm ci
      - name: Build api (builds shared first, then api's own dist)
        run: npm run build:api
      - name: Build app (builds shared first, then app's own dist)
        run: npm run build:app
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_MANGO_RIVER_070B8550F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "app/dist" # already-built app content - see custom build steps above
          api_location: "api" # api's own dist is pre-built above; Oryx installs api's node_modules itself (see api/package.json's file:../shared dependency)
          output_location: "" # app_location IS the built output already; nothing further to append
          skip_app_build: true
          # No skip_api_build here (unsupported by this action version) -
          # Oryx runs its own npm install/build inside api/. This now
          # works correctly: api/package.json points at shared via
          # "file:../shared" (a plain relative path, resolved without any
          # npm-workspace detection or registry lookup), rather than the
          # bare "*" workspace-style version spec that 404'd when Oryx's
          # isolated install phase failed to recognize the monorepo root.
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_MANGO_RIVER_070B8550F }}
          action: "close"
