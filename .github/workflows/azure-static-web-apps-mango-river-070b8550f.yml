name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install all workspace dependencies
        run: npm ci
      - name: Build api (builds shared first, then api's own dist)
        run: npm run build:api
      - name: Build app (builds shared first, then app's own dist)
        run: npm run build:app
      - name: Flatten hoisted node_modules into api/ for standalone deployment
        # npm workspaces hoists third-party dependencies into the repo
        # root's node_modules - but Azure zips up api_location in
        # isolation, so api/ needs its own real copy to run standalone
        # once deployed. The @yoruba-student-dict-platform/* scope is
        # excluded: npm workspaces symlinks it back to the workspace
        # folders themselves (e.g. .../api -> ../../api), and following
        # that for "api" would copy api/ into itself. shared's built
        # output - the one thing api actually needs from that scope - is
        # copied in explicitly instead.
        run: |
          mkdir -p api/node_modules
          rsync -a --exclude='@yoruba-student-dict-platform' node_modules/ api/node_modules/
          mkdir -p api/node_modules/@yoruba-student-dict-platform/shared
          cp -r shared/dist shared/package.json api/node_modules/@yoruba-student-dict-platform/shared/
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_MANGO_RIVER_070B8550F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "app/dist" # already-built app content - see custom build steps above
          api_location: "api" # already-built api, including flattened node_modules - see custom build steps above
          output_location: "" # app_location IS the built output already; nothing further to append
          skip_app_build: true
          # No skip_api_build here (unsupported by this action version) -
          # Oryx will still run its own npm install/build inside api/,
          # redundant but harmless (see comment history in the previous
          # resource's workflow file for why).
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_MANGO_RIVER_070B8550F }}
          action: "close"
